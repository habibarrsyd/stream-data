<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Scouting Radar</title>
    <style>
        /* CSS 100% sama kayak kemaren, gak ada yang diubah */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding: 40px 20px; }
        .dashboard-container { max-width: 900px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .header { grid-column: span 2; background: linear-gradient(135deg, #034694 0%, #005fcc 100%); padding: 20px; border-radius: 12px; text-align: center; color: white; box-shadow: 0 4px 15px rgba(3, 70, 148, 0.4); border: 1px solid #1f6feb; }
        .header h1 { font-size: 24px; letter-spacing: 2px; margin-bottom: 5px;}
        .header p { font-size: 14px; opacity: 0.8; }
        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card h2 { color: #58a6ff; font-size: 18px; margin-bottom: 15px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .decision-box { grid-column: span 2; background-color: #034694; color: white; text-align: center; font-size: 20px; font-weight: bold; padding: 20px; border-radius: 12px; border: 2px dashed #58a6ff; }
        .game-list li { list-style: none; padding: 10px 0; border-bottom: 1px solid #21262d; font-size: 15px; }
        .game-list li:last-child { border-bottom: none; }
        .parsed-text { line-height: 1.6; font-size: 15px; color: #8b949e; }
        strong { color: #f0f6fc; font-weight: 600; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h1>📡 STEAM SCOUTING RADAR</h1>
            <p id="timestamp-display">Daily AI Discount Reconnaissance</p>
        </div>

        <div class="card">
            <h2>🧠 Pundit Analysis</h2>
            <div id="analysis-content" class="parsed-text">Menyambungkan ke Supabase...</div>
        </div>

        <div class="card">
            <h2>🔥 Shortlisted Deals</h2>
            <ul id="games-content" class="game-list">Menyambungkan ke Supabase...</ul>
        </div>

        <div class="decision-box" id="decision-content">Loading decision...</div>
    </div>

    <script src="/api/config.js"></script>
    <script>
        // Placeholder constants for Supabase configuration
        // In production, these should be injected from environment variables
        const SUPABASE_URL = 'https://your-project.supabase.co';
        const SUPABASE_ANON_KEY = 'your-anon-key-here';

        const runtimeConfig = window.APP_CONFIG || {};
        const finalSupabaseUrl = runtimeConfig.SUPABASE_URL || SUPABASE_URL;
        const finalSupabaseKey = runtimeConfig.SUPABASE_ANON_KEY || SUPABASE_ANON_KEY;

        if (!finalSupabaseUrl || !finalSupabaseKey) {
            document.getElementById('analysis-content').innerText = '⚠️ Config Supabase belum tersedia. Jalankan lewat server lokal yang membaca .env.';
            document.getElementById('games-content').innerHTML = '<li>Config missing.</li>';
            document.getElementById('decision-content').innerText = '⚠️ Config missing';
            throw new Error('Supabase config missing');
        }

        // Fungsi fetch data dari Supabase via REST API
        fetch(`${finalSupabaseUrl}/rest/v1/steam_discount?select=raw_json&id=eq.1`, {
            method: 'GET',
            headers: {
                'apikey': finalSupabaseKey,
                'Authorization': `Bearer ${finalSupabaseKey}`
            }
        })
        .then(response => {
            if (!response.ok) throw new Error('Gagal nge-fetch Supabase');
            return response.json();
        })
        .then(data => {
            // Karena responsnya berupa Array, kita ambil baris pertama [0], lalu ambil raw_json-nya
            const dbData = data[0].raw_json;

            if (!dbData) {
                throw new Error('raw_json is empty');
            }

            // 1. Tampilkan Waktu Update
            const lastUpdate = dbData.last_update || 'Unknown';
            document.getElementById('timestamp-display').innerText = "Last Update (WIB): " + lastUpdate;

            // 2. Parsing Analisis AI (**)
            let rawAnalysis = String(dbData.pundit_analysis || '');
            // Remove escape characters dan normalize newlines
            rawAnalysis = rawAnalysis.replace(/\\n/g, '\n').replace(/\\"/g, '"');
            // Convert \n to <br> untuk display
            let formattedAnalysis = rawAnalysis
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
            
            const decisionSplit = formattedAnalysis.split(/<br>Decision:/i);
            document.getElementById('analysis-content').innerHTML = decisionSplit[0].trim() || 'No analysis available';

            // 3. Tampilkan Keputusan Akhir - hilangkan \n dan rapikan
            if (decisionSplit.length > 1) {
                let decision = decisionSplit[1].trim().replace(/<br>/g, ' ');
                document.getElementById('decision-content').innerHTML = "🎯 TACTICAL DECISION:<br>" + decision;
            } else {
                document.getElementById('decision-content').innerHTML = "🎯 TACTICAL DECISION:<br>No specific decision written by AI.";
            }

            // 4. Tampilkan Daftar Game Diskon
            let gamesListHtml = '';
            
            // Check if shortlisted_deals is object dengan discounted_games array
            if (dbData.shortlisted_deals && typeof dbData.shortlisted_deals === 'object' && Array.isArray(dbData.shortlisted_deals.discounted_games)) {
                gamesListHtml = dbData.shortlisted_deals.discounted_games
                    .map(game => `<li>🔵 <strong>${game.game_title}</strong> | ${game.discount_percentage}</li>`)
                    .join('');
            } else if (typeof dbData.shortlisted_deals === 'string') {
                // Fallback untuk format string comma-separated
                const gamesRaw = dbData.shortlisted_deals.split(',').filter(game => game.trim() !== '');
                gamesListHtml = gamesRaw.map(game => `<li>🔵 <strong>${game.trim()}</strong></li>`).join('');
            }
            
            document.getElementById('games-content').innerHTML = gamesListHtml || '<li>No hot deals found today.</li>';
            
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('analysis-content').innerText = "⚠️ Gagal narik data dari Supabase. Cek console log.";
        });
    </script>
</body>
</html>
